name: Create Release

on:
  push:
    tags:
      - 'v*'

jobs:
  release:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20.14.0'

      - name: Build artifacts
        run: |
          npm install
          npm run package

      - name: Create Release
        uses: softprops/action-gh-release@v1
        with:
          files: |
            *.vsix
